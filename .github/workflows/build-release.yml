name: Build and Release Executables

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. v1.0.0-pre)'
        required: true
        default: 'v1.0.0-pre'
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller --onefile --windowed --add-data "ressources;ressources" --collect-all panda3d --collect-all ursina --hidden-import panda3d.core --exclude-module panda3d.rocket --name "FiveNightsAtChatelet-Windows" Five_Nights_At_Chatelet.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/FiveNightsAtChatelet-Windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: pyinstaller --onefile --windowed --add-data "ressources:ressources" --collect-all panda3d --collect-all ursina --hidden-import panda3d.core --exclude-module panda3d.rocket --name "FiveNightsAtChatelet-Linux" Five_Nights_At_Chatelet.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/FiveNightsAtChatelet-Linux

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS executable
        run: pyinstaller --onefile --windowed --add-data "ressources:ressources" --collect-all panda3d --collect-all ursina --hidden-import panda3d.core --exclude-module panda3d.rocket --name "FiveNightsAtChatelet-macOS" Five_Nights_At_Chatelet.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/FiveNightsAtChatelet-macOS

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          prerelease: true
          files: |
            windows-build/FiveNightsAtChatelet-Windows.exe
            linux-build/FiveNightsAtChatelet-Linux
            macos-build/FiveNightsAtChatelet-macOS
          body: |
            ## Five Nights At Châtelet - ${{ github.event.inputs.version || github.ref_name }}

            ### Téléchargement
            - **Windows** : `FiveNightsAtChatelet-Windows.exe`
            - **Linux** : `FiveNightsAtChatelet-Linux` (chmod +x avant de lancer)
            - **macOS** : `FiveNightsAtChatelet-macOS`

            ### Installation
            1. Télécharger l'exécutable correspondant à votre OS
            2. Placer dans un dossier dédié
            3. Lancer directement (aucune installation de Python requise)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
